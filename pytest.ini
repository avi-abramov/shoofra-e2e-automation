[pytest]
testpaths = tests
pythonpath = .
addopts = -ra --alluredir=allure-results --clean-alluredir
markers =
    e2e: end-to-end coverage for full user journeys
    smoke: fast coverage of core customer journeys
    demo: visually rich recruiter-facing journey coverage
    account: login, registration, and password reset form coverage
    cart: add-to-cart and cart verification coverage
    catalog: product listing and product detail coverage
    navigation: header and direct page navigation coverage
    storefront: home page, shared layout, and storefront link coverage
    negative: expected validation and rejection scenarios
    external: coverage for links that leave the main site
