name: Shoofra E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke suite
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      BASE_URL: https://www.shoofra.co.il/
      BROWSER: chromium
      HEADLESS: "true"
      START_MAXIMIZED: "false"
      SLOW_MO_MS: "0"
      TEST_PAUSE_MS: "0"
      DEMO_HIGHLIGHT: "false"
      DEMO_ACTION_PAUSE_MS: "0"
      DEMO_FINAL_SCREENSHOT: "false"
      TRACE_ON_FAILURE: "true"
      VIDEO_ON_FAILURE: "false"
      VIEWPORT_WIDTH: "1920"
      VIEWPORT_HEIGHT: "1080"
      BROWSER_WINDOW_WIDTH: "1920"
      BROWSER_WINDOW_HEIGHT: "1080"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run smoke tests
        run: python -m pytest -q tests -m "smoke and not demo"

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: artifacts
          if-no-files-found: ignore
